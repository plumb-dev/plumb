- id: traceloop-openllmetry
  name: "OpenLLMetry"
  repo: https://github.com/traceloop/openllmetry
  author: traceloop

  author_provenance:
    description: "Traceloop is a YC-backed observability company. OpenLLMetry is the OpenTelemetry standard for LLM tracing, adopted by Datadog and Honeycomb."
    known_orgs: ["Y Combinator", "Datadog"]
    auto_verified: true
    provenance_score: 5

  category: observability
  subcategory: tracing
  problem_solved: "Adds OpenTelemetry-compatible tracing to any LLM call so you can see latency, token usage, and cost per request in your existing observability stack."

  languages: ["python", "typescript", "javascript"]

  assay:
    fork_to_star_ratio: 0.14         # (auto)
    monthly_active_contributors: 31  # (auto)
    download_velocity: 89400         # (auto) npm + PyPI combined weekly
    last_commit_days_ago: 3          # (auto)
    issue_quality_score: 4.5         # (auto)
    issue_quality_override: null
    provenance_score: 5              # (moderated)
    assay_score: 93                  # (auto)

  signals:
    dependencies: ["openai", "anthropic", "langchain", "llama-index", "cohere"]
    file_patterns: ["src/llm/", "lib/ai/", "services/llm/"]
    code_patterns: ["openai.chat.completions", "anthropic.messages.create", "client.chat"]

  anti_signals:
    dependencies: ["@traceloop/node-server-sdk", "traceloop-sdk"]
    file_patterns: []

  relevance_note: "Your {signal} calls have no tracing. Without OpenLLMetry you have no visibility into latency, token cost, or failure rates across your LLM layer."

  meta:
    added_by: plumb-maintainers
    added_date: 2026-06-22
