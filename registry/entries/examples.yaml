- id: mattpocock-skills
  name: "Skills for Real Engineers"
  repo: https://github.com/mattpocock/skills
  author: mattpocock

  author_provenance:
    description: "TypeScript educator with 74,500+ stars on this repo. Ex-Vercel. Active daily user of Claude Code in production."
    known_orgs: ["Vercel"]
    auto_verified: true
    provenance_score: 5

  category: agent-patterns
  subcategory: workflow-enforcement
  problem_solved: "Encodes engineering discipline into Claude Code so the agent follows your team's process rather than taking shortcuts."

  languages: ["typescript", "javascript", "markdown"]

  assay:
    fork_to_star_ratio: 0.086        # (auto)
    monthly_active_contributors: 12  # (auto)
    download_velocity: null          # (auto) not a published package
    last_commit_days_ago: 5          # (auto)
    issue_quality_score: 4.2         # (auto)
    issue_quality_override: null
    provenance_score: 5              # (moderated)
    assay_score: 87                  # (auto)

  signals:
    dependencies: ["@anthropic-ai/claude-code", "claude-code"]
    file_patterns: [".claude/", "CLAUDE.md", "AGENTS.md"]
    code_patterns: []

  anti_signals:
    dependencies: []
    file_patterns: [".claude/commands/grill-me.md"]  # already using Pocock's skills

  relevance_note: "Your {signal} setup has no structured workflow commands. Pocock's skills encode grilling sessions, TDD loops, and PRD generation directly into your agent."

  meta:
    added_by: plumb-maintainers
    added_date: 2026-06-22
    verified: true
    verified_by: plumb-maintainers
    last_reviewed: 2026-06-22
    last_auto_scored: 2026-06-22T00:00:00Z
    registry_version: "1.0.0"
    visibility: public
    org_id: null

